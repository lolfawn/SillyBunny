name: README Mirror

on:
  pull_request:
    paths:
      - README.md
      - .github/readme.md
      - scripts/sync-readme-mirror.sh
      - .github/workflows/readme-mirror.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/readme.md
      - scripts/sync-readme-mirror.sh
      - .github/workflows/readme-mirror.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-readme-mirror:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify README mirror is in sync
        run: bash scripts/sync-readme-mirror.sh --check

  sync-readme-mirror:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Sync README mirror
        run: bash scripts/sync-readme-mirror.sh

      - name: Commit README mirror update
        run: |
          if git diff --quiet --exit-code -- .github/readme.md; then
            echo "README mirror already matched the root README."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/readme.md
          git commit -m "Sync GitHub README mirror"
          git push
